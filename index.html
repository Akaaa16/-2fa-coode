<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>2FA Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otplib/12.0.1/otplib-browser.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 10px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #f472b6; }
        .email-text { font-size: 13px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .code-num { color: #f472b6; font-size: 22px; font-weight: bold; }
        .copy-btn { background: #38bdf8; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>🔐 مدير الأكواد</h2>
    <div id="main-container" style="width: 100%; max-width: 400px;"></div>

    <script>
        const rawData = `mbqlg6lz@mandaladark.io:5X6MLQV5A34IHAKXAN3ZXEHME6LWEALD
xu4ff4og@mandaladark.i:FI6TOS6HNQ6J6XUYOV3Z7NOIKBDXPSHU
700qr4s7@mandaladark.i:FLQNFGIGTCD2V4GXPSOHEXBAY3CES4GR`;

        const accounts = rawData.trim().split('\n').map(line => {
            const [email, secret] = line.trim().split(':');
            return { email, secret };
        });

        function render() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            accounts.forEach(acc => {
                try {
                    const token = otplib.authenticator.generate(acc.secret);
                    container.innerHTML += `
                        <div class="card">
                            <div class="email-text">${acc.email}</div>
                            <div>
                                <span class="code-num">${token}</span>
                                <button class="copy-btn" onclick="navigator.clipboard.writeText('${token}')">نسخ</button>
                            </div>
                        </div>
                    `;
                } catch(e) { console.error("Error generating token for " + acc.email); }
            });
        }
        
        setInterval(render, 30000);
        render();
    </script>
</body>
</html>
